$kind: http-request
name: GET /health — should return healthy status
url: "{{baseUrl}}/health"
method: GET
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: "{{correlationId}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('GET /health — should return healthy status', function () {
        pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.test('Health response should include service status and correlation ID', function () {
        pm.expect(json.status).to.eql('healthy');
        pm.expect(json.service).to.eql('Digital Account Opening API');
        pm.expect(json.timestamp).to.be.a('string');
        pm.expect(json.correlationId).to.be.a('string');
      });
    language: text/javascript
order: 1000
