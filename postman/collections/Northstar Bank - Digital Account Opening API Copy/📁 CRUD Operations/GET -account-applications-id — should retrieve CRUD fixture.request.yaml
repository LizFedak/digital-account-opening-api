$kind: http-request
name: GET /account-applications/:id — should retrieve CRUD fixture
url: "{{baseUrl}}/account-applications/{{crudApplicationId}}"
method: GET
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: "{{correlationId}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('GET /account-applications/:id — should retrieve CRUD fixture', function () {
        pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.test('Retrieved CRUD fixture should match saved ID', function () {
        pm.expect(json.data.applicationId).to.eql(pm.collectionVariables.get('crudApplicationId'));
        pm.expect(json.data.status).to.eql('submitted');
        pm.expect(json.meta.correlationId).to.be.a('string');
      });
    language: text/javascript
order: 3002
