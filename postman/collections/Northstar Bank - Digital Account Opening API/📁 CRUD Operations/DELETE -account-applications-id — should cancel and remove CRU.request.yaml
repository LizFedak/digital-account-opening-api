$kind: http-request
name: DELETE /account-applications/:id — should cancel and remove CRUD fixture
url: "{{baseUrl}}/account-applications/{{crudApplicationId}}"
method: DELETE
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: "{{correlationId}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('DELETE /account-applications/:id — should cancel and remove CRUD fixture', function () {
        pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.test('Delete response should include cancellation result', function () {
        pm.expect(json.data.applicationId).to.eql(pm.collectionVariables.get('crudApplicationId'));
        pm.expect(json.data.status).to.eql('cancelled');
        pm.expect(json.data.deleted).to.eql(true);
        pm.expect(json.meta.correlationId).to.be.a('string');
      });
    language: text/javascript
order: 5000
