$kind: http-request
name: GET /account-applications/:id — should verify final approved state
url: "{{baseUrl}}/account-applications/{{createdApplicationId}}"
method: GET
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: "{{correlationId}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('GET /account-applications/:id — should verify final approved state', function () {
        pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.test('Final state should be approved', function () {
        pm.expect(json.data.applicationId).to.eql(pm.collectionVariables.get('createdApplicationId'));
        pm.expect(json.data.status).to.eql('approved');
        pm.expect(json.data.identityVerification.verificationStatus).to.eql('verified');
      });
      pm.test('Final response should satisfy contract shape', function () {
        pm.expect(json.data.riskScore).to.be.a('number');
        pm.expect(json.data.funding.initialDepositAmount).to.be.a('number');
        pm.expect(json.meta.correlationId).to.be.a('string');
      });
    language: text/javascript
order: 5000
