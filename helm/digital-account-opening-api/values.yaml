replicaCount: 2
image:
  repository: northstar/digital-account-opening-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
ingress:
  enabled: true
  hosts:
    - host: digital-account-opening-api.northstarbank.internal
      paths:
        - path: /
          pathType: Prefix
env:
  PORT: "3000"
apiKeySecret:
  value: "demo-key"
