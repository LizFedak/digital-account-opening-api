name: API Quality Checks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  postman-api-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key "${{ secrets.POSTMAN_API_KEY }}"

      - name: Lint OpenAPI spec
        run: postman spec lint ./openapi.yaml --workspace-id 445f54a3-9b60-4f86-9b0a-a026856a185a --report-events

      - name: Run Postman collection
        run: postman collection run 9474696-3ecd63be-43af-451c-8d0f-810f7f7ad77a -e 9474696-21e13fae-8143-4728-b4ad-878fe437ddcf -i 9474696-4f8dc599-d3b1-4457-ba44-87b536c92b8b --report-events
